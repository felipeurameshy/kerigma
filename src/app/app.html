@if(!tipoServidor){
  <div id="barraDeHmologacao" class=homologacao>
    <label for="barraDeHmologacao">VERSÃO HOMOLOGAÇÃO</label>
  </div>
}

<div [ngClass]="{'desabilitar-router': mostrarLoading}">
  <router-outlet></router-outlet>
</div>

@if(mostrarLoading) {
  <app-loading></app-loading>
}

<p-confirmDialog header="Confirmação" icon="pi pi-exclamation-triangle" #confirmacao>
    <ng-template pTemplate="footer">
      <p-button icon="pi pi-times" label="Não" (click)="confirmacao.onReject()" severity="secondary" outlined/>
      <p-button icon="pi pi-check" label="Sim" (click)="confirmacao.onAccept()" severity="danger" outlined autofocus/>
    </ng-template>
</p-confirmDialog>

<p-toast position="bottom-right" [life]="10000"></p-toast>
