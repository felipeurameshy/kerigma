<app-floating-configurator />
<div
    class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">
        <div
            style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
            <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20" style="border-radius: 53px">
                <div class="text-center mb-8">
                    <div class="mb-8 w-16 shrink-0 mx-auto">
                        <img src="favicon.ico" class="w-[50px] h-[50px]"/>
                    </div>
                    <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">Bem vindo ao Kerigma</div>
                    <span class="text-muted-color font-medium">Faça login para continuar</span>
                </div>

                <div>
                    <label for="email"
                        class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">E-mail</label>
                    <input pInputText id="email" type="text" placeholder="E-mail" class="w-full md:w-120 mb-8"
                        [(ngModel)]="email" />

                    <label for="senha"
                        class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2">Senha</label>
                    <p-password id="senha" [(ngModel)]="senha" placeholder="Senha" [toggleMask]="true"
                        styleClass="mb-4" [fluid]="true" [feedback]="false" (keyup.enter)="login(email, senha)"></p-password>

                    <p-button label="Acessar" styleClass="w-full" (onClick)="login(email, senha)"></p-button>
                </div>
            </div>
        </div>
    </div>
</div>
